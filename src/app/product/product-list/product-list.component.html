@if (products$ | async) {
@for (product of products$ | async; track product.id) {
<mat-card class="product-card" appearance="outlined">
    <img mat-card-image src="https://material.angular.dev/assets/img/examples/shiba2.jpg" alt="Product Image">
    <mat-card-content>
        <mat-card-title>{{ product?.name }}</mat-card-title>
        <mat-card-subtitle>{{ product?.price }}</mat-card-subtitle>
    </mat-card-content>
</mat-card>
}}
